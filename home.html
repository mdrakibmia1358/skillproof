<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkillProof Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="app-header">
    <div class="brand">SkillProof</div>
    <nav class="app-nav">
      <a href="#">Dashboard</a>
      <a href="#">Profile</a>
      <a href="#">Skills</a>
      <a href="#">Recruiter</a>
    </nav>
  </header>
  <main class="dashboard-wrapper">
    <section class="banner-section">
      <h1>Welcome, Developer</h1>
      <p>Your GitHub-verified skill assessment dashboard.</p>
    </section>
    <section class="stats-grid">
      <div class="stat-card">
        <h3>Trust Score</h3>
        <p class="stat-number">87</p>
      </div>
      <div class="stat-card">
        <h3>Skills Verified</h3>
        <p class="stat-number">12</p>
      </div>
      <div class="stat-card">
        <h3>Repositories</h3>
        <p class="stat-number">24</p>
      </div>
    </section>
  </main>
  <footer class="app-footer">
    <p>&copy; 2026 SkillProof. Evidence-Based Developer Assessment.</p>
  </footer>
</body>
</html>
