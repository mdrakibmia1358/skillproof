<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkillProof - Skill Scores</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="app-header">
    <div class="brand">SkillProof</div>
    <nav class="app-nav">
      <a href="home.html">Dashboard</a>
      <a href="skills.html">Skills</a>
    </nav>
  </header>
  <main class="dashboard-wrapper">
    <section class="banner-section">
      <h1>Verified Skill Scores</h1>
      <p>Skills verified from your GitHub repositories.</p>
    </section>
    <section class="stats-grid">
      <div class="stat-card">
        <h3>PHP</h3>
        <p class="stat-number">78</p>
      </div>
      <div class="stat-card">
        <h3>JavaScript</h3>
        <p class="stat-number">65</p>
      </div>
      <div class="stat-card">
        <h3>SQL</h3>
        <p class="stat-number">72</p>
      </div>
      <div class="stat-card">
        <h3>HTML/CSS</h3>
        <p class="stat-number">85</p>
      </div>
      <div class="stat-card">
        <h3>Git</h3>
        <p class="stat-number">70</p>
      </div>
      <div class="stat-card">
        <h3>Java</h3>
        <p class="stat-number">55</p>
      </div>
    </section>
  </main>
  <footer class="app-footer">
    <p>&copy; 2026 SkillProof.</p>
  </footer>
</body>
</html>
